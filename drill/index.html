<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />
  <title>Drill Mode · Baccarat Table Trainer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/table.css" />
  <link rel="stylesheet" href="drill.css" />
  <script src="../js/core/gate.js"></script>
</head>
<body>
  <div class="trainer trainer--bare">
    <div class="trainer__stage">
      <section class="felt felt--drill" id="felt">

        <!-- Rail: back + category filter -->
        <div class="drill-rail">
          <a class="icon-btn" href="../index.html" aria-label="Back to menu" title="Back to menu">
            <i class="fas fa-arrow-left"></i>
          </a>
          <div class="cat-filter" role="group" aria-label="Drill category">
            <button class="cat-btn cat-btn--active" data-cat="player">Player</button>
            <button class="cat-btn" data-cat="banker">Banker</button>
            <button class="cat-btn" data-cat="mixed">Mixed</button>
          </div>
        </div>

        <!-- Scenario display -->
        <div class="drill-scenario" id="scenario">
          <p class="scenario-context" id="scenario-context"></p>
          <div class="scenario-q" id="scenario-q"></div>
          <div class="scenario-answer" id="scenario-answer" hidden></div>
        </div>

        <!-- Decision controls — same visual weight; no pre-answer signal -->
        <div class="drill-controls" id="drill-controls">
          <button class="drill-btn drill-btn--draw" id="btn-draw">Draw</button>
          <button class="drill-btn drill-btn--stand" id="btn-stand">Stand</button>
        </div>

      </section>
    </div>

    <footer class="dock">
      <div class="dock__stats">
        <span class="statchip">Correct <b id="s-correct">0</b></span>
        <span class="statchip">Wrong <b id="s-wrong">0</b></span>
        <span class="statchip">Streak <b id="s-streak">0</b></span>
        <span class="statchip">Rate <b id="s-rate">0%</b></span>
      </div>
      <span class="dock__spacer"></span>
      <button class="icon-btn" id="reset-btn" title="Reset stats">
        <i class="fas fa-rotate-right"></i>
      </button>
    </footer>
  </div>

  <script src="drill.js"></script>
</body>
</html>
